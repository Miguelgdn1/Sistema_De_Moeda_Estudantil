<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><title>Confirmacao de envio de moedas</title></head>
<body style="font-family: Arial, Helvetica, sans-serif; background:#f4f6fb; padding:20px; color:#1f2937;">
  <div style="max-width:600px; margin:0 auto; background:#fff; border-radius:8px; padding:24px; box-shadow:0 2px 8px rgba(0,0,0,.05);">
    <h2 style="color:#1d4ed8; margin-top:0;">Envio confirmado</h2>
    <p>Ola, {{nomeProfessor}}! Voce distribuiu <strong>{{quantidade}} moedas</strong> para o aluno <strong>{{nomeAluno}}</strong>.</p>
    <div style="background:#f1f5f9; border-radius:6px; padding:12px 16px; margin:16px 0;">
      <p style="margin:0;"><strong>Mensagem enviada:</strong></p>
      <p style="margin:8px 0 0;">{{mensagem}}</p>
    </div>
    <p>Seu saldo atual: <strong>{{saldoAtual}} moedas</strong>.</p>
    <p style="font-size:13px; color:#6b7280;">Data: {{dataHora}}</p>
    <hr style="border:none; border-top:1px solid #e5e7eb; margin:24px 0;">
    <p style="font-size:12px; color:#9ca3af;">Sistema de Moeda Estudantil &middot; PUC Minas</p>
  </div>
</body>
</html>
