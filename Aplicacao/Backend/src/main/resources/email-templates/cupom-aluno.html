<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><title>Seu cupom de resgate</title></head>
<body style="font-family: Arial, Helvetica, sans-serif; background:#f4f6fb; padding:20px; color:#1f2937;">
  <div style="max-width:600px; margin:0 auto; background:#fff; border-radius:8px; padding:24px; box-shadow:0 2px 8px rgba(0,0,0,.05);">
    <h2 style="color:#15803d; margin-top:0;">Resgate concluido!</h2>
    <p>Ola, {{nomeAluno}}! Voce resgatou a vantagem <strong>{{nomeVantagem}}</strong> da empresa <strong>{{nomeEmpresa}}</strong>.</p>
    <div style="text-align:center; padding:16px 0;">
      <img src="cid:cupom-qr" alt="QR Code do cupom" style="max-width:240px; border:8px solid #fff; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,.05);">
    </div>
    <div style="background:#f0fdf4; border:1px dashed #15803d; padding:16px; text-align:center; border-radius:8px; margin:16px 0;">
      <p style="margin:0; font-size:13px; color:#15803d;">CODIGO DO CUPOM</p>
      <p style="margin:8px 0 0; font-size:24px; font-weight:bold; letter-spacing:2px;">{{codigoCupom}}</p>
    </div>
    <p>Apresente este cupom (codigo ou QR Code) na empresa para retirar sua vantagem.</p>
    <p style="font-size:13px; color:#6b7280;">Valido ate: <strong>{{dataExpiracao}}</strong></p>
    <hr style="border:none; border-top:1px solid #e5e7eb; margin:24px 0;">
    <p style="font-size:12px; color:#9ca3af;">Sistema de Moeda Estudantil &middot; PUC Minas</p>
  </div>
</body>
</html>
