micronaut:
  application:
    name: moedaestudantil
  server:
    cors:
      enabled: true
      configurations:
        web:
          allowed-origins:
            - ${CORS_ALLOWED_ORIGIN:`http://localhost:4200`}
          allowed-origins-regex:
            - "^https://.*$"
            - "^http://localhost:.*$"
          allowed-methods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
          allowed-headers:
            - Authorization
            - Content-Type
  security:
    authentication: bearer
    intercept-url-map:
      - pattern: /swagger/**
        access:
          - isAnonymous()
      - pattern: /swagger-ui/**
        access:
          - isAnonymous()
    token:
      jwt:
        signatures:
          secret:
            generator:
              secret: ${JWT_SECRET:`pleaseChangeThisSecretInProductionItMustBeAtLeast256bits`}
        generator:
          access-token:
            expiration: 14400
  router:
    static-resources:
      swagger:
        paths: classpath:META-INF/swagger
        mapping: /swagger/**
      swagger-ui:
        paths: classpath:META-INF/swagger/views/swagger-ui
        mapping: /swagger-ui/**
      redoc:
        paths: classpath:META-INF/swagger/views/redoc
        mapping: /redoc/**

datasources:
  default:
    db-type: postgres
    dialect: POSTGRES
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:`jdbc:postgresql://localhost:5432/moedaestudantil`}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    schema-generate: NONE

flyway:
  datasources:
    default:
      enabled: true
      locations: classpath:db/migration
      baseline-on-migrate: true
      # Migrations ja aplicadas que sofreram edicao cosmetica (CRLF/whitespace) sem mudanca
      # semantica geram checksum mismatch. Desligamos validate-on-migrate em dev para nao
      # bloquear o startup. Em producao, prefira rodar `flyway repair` antes do deploy.
      validate-on-migrate: false

jpa:
  default:
    properties:
      hibernate:
        hbm2ddl:
          auto: validate
        show_sql: false

jackson:
  serialization:
    writeDatesAsTimestamps: false

rabbitmq:
  uri: ${RABBITMQ_URI:`amqp://guest:guest@localhost:5672`}

notifications:
  exchange: notifications.exchange
  queues:
    email: email.queue
    whatsapp: whatsapp.queue
    dlq: notifications.dlq
  dlx: notifications.dlx

mail:
  enabled: ${MAIL_ENABLED:false}
  host: ${MAIL_HOST:sandbox.smtp.mailtrap.io}
  port: ${MAIL_PORT:2525}
  username: ${MAIL_USERNAME:}
  password: ${MAIL_PASSWORD:}
  from: ${MAIL_FROM:no-reply@moedaestudantil.local}
  from-name: ${MAIL_FROM_NAME:Sistema de Moeda Estudantil}
  starttls: ${MAIL_STARTTLS:true}

# WhatsApp via API NAO OFICIAL (Evolution API - gateway self-hosted pareado por QR Code).
whatsapp:
  enabled: ${WHATSAPP_ENABLED:false}
  base-url: ${WHATSAPP_BASE_URL:`http://localhost:8081`}
  instance: ${WHATSAPP_INSTANCE:moedaestudantil}
  api-key: ${WHATSAPP_API_KEY:}
  country-code: ${WHATSAPP_COUNTRY_CODE:55}
  send-qr-image: ${WHATSAPP_SEND_QR:true}
