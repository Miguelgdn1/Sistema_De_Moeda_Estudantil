<app-shell>

      title="Vantagens"
      subtitle="Ofertas que sua empresa disponibiliza aos alunos."
    ></app-page-header>

    <app-card [padded]="false">
      <app-empty-state

      ></app-empty-state>
    </app-card>
  </div>
</app-shell>
