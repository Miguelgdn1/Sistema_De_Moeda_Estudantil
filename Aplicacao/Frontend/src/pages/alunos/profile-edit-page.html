<app-shell>
  <div class="container-narrow">
    <app-page-header
      title="Meu perfil"
      subtitle="Atualize seus dados pessoais. Campos de identidade são apenas leitura."
      backTo="/alunos/painel"
    ></app-page-header>

    <ng-container *ngIf="loading(); else loaded">
      <app-card>
        <div class="loading-state">
          <span class="material-icons spin">progress_activity</span>
          <p>Carregando dados...</p>
        </div>
      </app-card>
    </ng-container>

    <ng-template #loaded>
      <div class="profile-grid">
        <app-card title="Dados pessoais">
          <form class="form" [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
            <app-form-field
              label="Nome completo"
              [required]="true"
              [hasError]="invalid('nome')"
              error="Nome obrigatório (mínimo 3 caracteres)"
            >
              <input type="text" formControlName="nome">
            </app-form-field>

            <app-form-field
              label="E-mail"
              [required]="true"
              [hasError]="invalid('email')"
              error="E-mail inválido"
            >
              <input type="email" formControlName="email" autocomplete="email">
            </app-form-field>

            <app-form-field
              label="Telefone (WhatsApp)"
              hint="Formato internacional, ex.: +5531999999999"
              [hasError]="invalid('telefone')"
              error="Use o formato E.164 (ex.: +5531999999999)"
            >
              <input type="tel" formControlName="telefone" placeholder="+5531999999999" autocomplete="tel">
            </app-form-field>

            <app-form-field label="CEP" hint="Digite para preencher automaticamente">
              <app-cep-input
                [value]="form.controls.cep.value"
                (valueChange)="form.controls.cep.setValue($event)"
                (enderecoEncontrado)="onCepEncontrado($event)"
              ></app-cep-input>
            </app-form-field>

            <div class="grid-2">
              <app-form-field label="Logradouro">
                <input type="text" formControlName="logradouro" autocomplete="street-address">
              </app-form-field>
              <app-form-field label="Número">
                <input type="text" formControlName="numero">
              </app-form-field>
            </div>

            <app-form-field label="Complemento">
              <input type="text" formControlName="complemento" placeholder="Apto, sala, bloco...">
            </app-form-field>

            <div class="grid-3">
              <app-form-field label="Bairro">
                <input type="text" formControlName="bairro">
              </app-form-field>
              <app-form-field label="Cidade">
                <input type="text" formControlName="cidade">
              </app-form-field>
              <app-form-field label="UF">
                <input type="text" formControlName="uf" maxlength="2" style="text-transform: uppercase;">
              </app-form-field>
            </div>

            <app-form-field
              label="Nova senha"
              hint="Deixe em branco para manter"
              [hasError]="invalid('senha')"
              error="Senha deve ter no mínimo 6 caracteres"
            >
              <input type="password" formControlName="senha" autocomplete="new-password" placeholder="••••••••">
            </app-form-field>

            <div class="actions">
              <app-button variant="secondary" type="button" (click)="cancel()">Cancelar</app-button>
              <app-button variant="primary" type="submit" [loading]="saving()" [disabled]="form.invalid">
                Salvar alterações
              </app-button>
            </div>
          </form>
        </app-card>

        <app-card title="Informações de cadastro" subtitle="Estes campos são gerenciados pela instituição.">
          <dl class="readonly">
            <div><dt>CPF</dt><dd>{{ profile()?.cpf }}</dd></div>
            <div><dt>RG</dt><dd>{{ profile()?.rg }}</dd></div>
            <div><dt>Curso</dt><dd>{{ profile()?.curso }}</dd></div>
            <div><dt>Instituição</dt><dd>{{ profile()?.instituicaoNome }}</dd></div>
            <div><dt>Saldo de moedas</dt><dd class="strong">M$ {{ profile()?.saldoMoedas }}</dd></div>
          </dl>
        </app-card>
      </div>
    </ng-template>
  </div>
</app-shell>
