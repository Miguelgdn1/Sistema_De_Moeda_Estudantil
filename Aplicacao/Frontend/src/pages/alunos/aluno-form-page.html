<app-shell>
  <div class="container-narrow">
    <app-page-header
      [title]="isEdit() ? 'Editar aluno' : 'Cadastrar aluno'"
      [subtitle]="isEdit() ? 'Atualize os dados do aluno.' : 'Cadastre-se para participar do programa de mérito.'"
      [backTo]="isEdit() ? '/alunos' : '/login'"
    ></app-page-header>

    <app-card>
      <form class="form" [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
        <div class="grid">
          <app-form-field
            label="Nome completo"
            [required]="true"
            [hasError]="invalid('nome')"
            error="Nome é obrigatório"
          >
            <input type="text" formControlName="nome" placeholder="Ex.: Ana Silva">
          </app-form-field>

          <app-form-field
            label="E-mail"
            [required]="true"
            [hasError]="invalid('email')"
            error="Informe um e-mail válido"
          >
            <input type="email" formControlName="email" placeholder="voce@exemplo.com" autocomplete="email">
          </app-form-field>

          <app-form-field
            label="CPF"
            [required]="true"
            [hint]="'Apenas dígitos, 11 caracteres'"
            [hasError]="invalid('cpf')"
            error="CPF deve ter 11 dígitos numéricos"
          >
            <input type="text" formControlName="cpf" placeholder="00000000000" maxlength="11" inputmode="numeric">
          </app-form-field>

          <app-form-field
            label="RG"
            [required]="true"
            [hasError]="invalid('rg')"
            error="RG é obrigatório"
          >
            <input type="text" formControlName="rg" placeholder="MG-00.000.000">
          </app-form-field>

          <app-form-field
            label="Telefone (WhatsApp)"
            hint="Formato internacional. Ex.: +5531999999999"
            [hasError]="invalid('telefone')"
            error="Use o formato E.164 (ex.: +5531999999999)"
          >
            <input type="tel" formControlName="telefone" placeholder="+5531999999999" autocomplete="tel">
          </app-form-field>

          <app-form-field
            label="Curso"
            [required]="true"
            [hasError]="invalid('curso')"
            error="Selecione um curso"
          >
            <select formControlName="curso">
              <option value="" disabled>Selecione o curso</option>
              @for (c of cursos; track c) {
                <option [value]="c">{{ c }}</option>
              }
            </select>
          </app-form-field>

          <app-form-field
            label="Instituição"
            [required]="true"
            [hasError]="invalid('instituicaoId')"
            error="Selecione uma instituição"
          >
            <select formControlName="instituicaoId">
              <option [ngValue]="0" disabled>Selecione a instituição</option>
              @for (i of instituicoes(); track i.id) {
                <option [ngValue]="i.id">{{ i.nome }}</option>
              }
            </select>
          </app-form-field>

          <app-form-field label="CEP" hint="Digite o CEP para preencher automaticamente">
            <app-cep-input
              [value]="form.controls.cep.value"
              (valueChange)="form.controls.cep.setValue($event)"
              (enderecoEncontrado)="onCepEncontrado($event)"
            ></app-cep-input>
          </app-form-field>

          <app-form-field label="Logradouro">
            <input type="text" formControlName="logradouro" placeholder="Rua, avenida..." autocomplete="street-address">
          </app-form-field>

          <app-form-field label="Número">
            <input type="text" formControlName="numero" placeholder="Ex.: 123">
          </app-form-field>

          <app-form-field label="Complemento">
            <input type="text" formControlName="complemento" placeholder="Apto, sala, bloco...">
          </app-form-field>

          <app-form-field label="Bairro">
            <input type="text" formControlName="bairro">
          </app-form-field>

          <app-form-field label="Cidade">
            <input type="text" formControlName="cidade">
          </app-form-field>

          <app-form-field label="UF">
            <input type="text" formControlName="uf" maxlength="2" placeholder="MG" style="text-transform: uppercase;">
          </app-form-field>

          <app-form-field
            class="span-2"
            label="Senha"
            [required]="!isEdit()"
            [hint]="isEdit() ? 'Deixe em branco para manter a senha atual' : 'Mínimo 6 caracteres'"
            [hasError]="invalid('senha')"
            error="A senha deve ter no mínimo 6 caracteres"
          >
            <input type="password" formControlName="senha" [placeholder]="isEdit() ? '••••••••' : 'Pelo menos 6 caracteres'" autocomplete="new-password">
          </app-form-field>
        </div>

        <div class="actions">
          <app-button variant="secondary" type="button" (click)="cancel()">Cancelar</app-button>
          <app-button variant="primary" type="submit" [loading]="saving()" [disabled]="form.invalid">
            {{ isEdit() ? 'Salvar alterações' : 'Cadastrar' }}
          </app-button>
        </div>
      </form>
    </app-card>
  </div>
</app-shell>
