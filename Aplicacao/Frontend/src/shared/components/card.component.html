<section class="card" [class.card--flat]="flat" [class.card--padded]="padded">
  <header *ngIf="title || subtitle" class="card__header">
    <div>
      <h3 *ngIf="title" class="card__title">{{ title }}</h3>
      <p *ngIf="subtitle" class="card__subtitle">{{ subtitle }}</p>
    </div>
    <div class="card__header-actions"><ng-content select="[card-actions]"></ng-content></div>
  </header>
  <div class="card__body">
    <ng-content></ng-content>
  </div>
</section>
